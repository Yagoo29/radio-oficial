<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio 87 FM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    padding: 20px;
    width: 100%;
    max-width: 400px;
}

.logo {
    width: 140px;
    height: 140px;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

h1 {
    font-size: 26px;
    margin-bottom: 10px;
}

p {
    color: #aaa;
    margin-bottom: 30px;
}

.player {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: #ff0055;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #e6004c;
    transform: scale(1.03);
}

audio {
    width: 100%;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

    <img class="logo" src="https://via.placeholder.com/150" alt="Logo Rádio">

    <h1>Rádio 87 FM</h1>
    <p>Ao vivo 24h no ar 🎧</p>

    <div class="player">

        <button onclick="document.getElementById('radio').play()">
            ▶ Tocar Rádio
        </button>

        <button style="margin-top:10px;background:#333" onclick="document.getElementById('radio').pause()">
            ⏸ Pausar
        </button>

        <audio id="radio" src="SEU_STREAM_AQUI"></audio>

    </div>

</div>

</body>
</html>
